<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <title>WPGU 107.1 | Song Request</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/tid3tgd.css">
    
    <style>
        :root {
            /* WPGU Colors */
            --wpgu-bg: #000000;           /* True Black Background */
            --wpgu-surface: #111111;      /* Slightly lifted surface for cards */
            --wpgu-text-main: #FAFAFA;    /* Off-White Text on dark bg */
            --wpgu-text-muted: #757575;   /* Gray */
            --wpgu-primary: #4CAF50;      /* Primary Green */
            --wpgu-secondary: #C8E6C9;    /* Secondary Light Green */
            --wpgu-off-black: #212121;    /* Off-Black (used for button text on green) */
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--wpgu-bg);
            color: var(--wpgu-text-main);
            font-family: "din-2014", sans-serif;
            font-weight: 300;
            font-style: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
        }

        h1, h2, h3, h4, h5, h6, label, .bold-text {
            font-family: "din-2014", sans-serif;
            font-weight: 700;
            font-style: normal;
            margin: 0;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-section .wpgu-logo {
            width: 100%;
            max-width: 260px;
            height: auto;
            display: block;
            margin: 0 auto 1rem auto;
        }

        .header-section h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--wpgu-primary);
            text-transform: uppercase;
        }

        .header-section p {
            color: var(--wpgu-text-muted);
            font-size: 1.1rem;
            margin: 0;
            font-weight: 300;
        }

        .form-container {
            background-color: var(--wpgu-surface);
            padding: 2.5rem;
            border-radius: 8px;
            border: 2px solid var(--wpgu-text-muted);
            box-shadow: 8px 8px 0px var(--wpgu-primary);
            width: 100%;
            max-width: 450px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            color: var(--wpgu-text-main);
            text-transform: uppercase;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--wpgu-text-muted);
            border-radius: 4px;
            font-family: "din-2014", sans-serif;
            font-weight: 300;
            font-size: 1.05rem;
            background-color: var(--wpgu-bg);
            color: var(--wpgu-text-main);
            transition: all 0.2s ease-in-out;
        }

        input[type="text"]:focus, input[type="email"]:focus {
            outline: none;
            border-color: var(--wpgu-primary);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        input::placeholder {
            color: var(--wpgu-text-muted);
            font-style: italic;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: rgba(200, 230, 201, 0.08);
            border-radius: 4px;
            border: 1px solid var(--wpgu-primary);
        }

        .checkbox-group label {
            margin: 0;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: none;
            font-weight: 700;
            color: var(--wpgu-text-main);
        }

        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
            accent-color: var(--wpgu-primary);
            flex-shrink: 0;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--wpgu-primary);
            color: var(--wpgu-off-black);
            border: 2px solid var(--wpgu-primary);
            border-radius: 4px;
            font-family: "din-2014", sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--wpgu-text-main);
            border-color: var(--wpgu-text-main);
            color: var(--wpgu-off-black);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--wpgu-text-muted);
            border-color: var(--wpgu-text-muted);
            color: var(--wpgu-bg);
            cursor: not-allowed;
            transform: none;
        }

        #success-message {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease-in;
        }

        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: var(--wpgu-primary);
        }

        .success-text {
            color: var(--wpgu-text-main);
            font-weight: 700;
            margin-bottom: 2rem;
            font-size: 1.4rem;
        }

        #submitAnotherBtn {
            background-color: transparent;
            color: var(--wpgu-text-main);
            border: 2px solid var(--wpgu-text-main);
        }

        #submitAnotherBtn:hover {
            background-color: var(--wpgu-primary);
            border-color: var(--wpgu-primary);
            color: var(--wpgu-off-black);
        }

        .optional-label {
            text-transform: none;
            color: var(--wpgu-text-muted);
            font-weight: 300;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

            </svg>
            <h2>Song Request</h2>
            <p>Submit a song for the library</p>
        </div>

        <form id="songRequestForm">
            <div class="checkbox-group">
                <input type="checkbox" id="is_employee" name="is_employee" {{ 'checked' if current_user.is_authenticated else '' }}>
                <label for="is_employee">I am an IMC Employee</label>
            </div>

            <div class="form-group">
                <label for="song_name">Song Title *</label>
                <input type="text" id="song_name" name="song_name" placeholder="e.g. Mr. Brightside" required>
            </div>

            <div class="form-group">
                <label for="artist_name">Artist *</label>
                <input type="text" id="artist_name" name="artist_name" placeholder="e.g. The Killers" required>
            </div>

            <div class="form-group" id="email_group">
                <label for="email">Email <span class="optional-label">(Optional)</span></label>
                <input type="email" id="email" name="email" placeholder="Get notified when it's added">
            </div>

            <button type="submit" id="submitBtn">Submit Request</button>
        </form>

        <div id="success-message">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="56" height="56" fill="#4CAF50" aria-hidden="true">
                    <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
                </svg>
            </div>
            <div class="success-text">Request submitted successfully!</div>
            <button type="button" id="submitAnotherBtn">Submit Another Song</button>
        </div>

    </div>

    <script>
        const isAuthenticated = {{ 'true' if current_user.is_authenticated else 'false' }};

        const employeeCheckbox = document.getElementById('is_employee');
        const emailGroup = document.getElementById('email_group');
        const form = document.getElementById('songRequestForm');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submitBtn');
        const submitAnotherBtn = document.getElementById('submitAnotherBtn');

        if (isAuthenticated) {
            emailGroup.style.display = 'none';
        }

        employeeCheckbox.addEventListener('change', function() {
            if (this.checked) {
                if (!isAuthenticated) {
                    window.location.href = `/login?state=${encodeURIComponent(window.location.pathname)}`;
                } else {
                    emailGroup.style.display = 'none';
                }
            } else {
                emailGroup.style.display = 'block';
            }
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const payload = {
                song_name: document.getElementById('song_name').value,
                artist_name: document.getElementById('artist_name').value,
                is_employee: employeeCheckbox.checked,
                email: document.getElementById('email').value
            };

            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            try {
                const response = await fetch('/wpgu-song-requests/form', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    alert('There was an error submitting your request. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Request';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('A network error occurred.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Request';
            }
        });

        submitAnotherBtn.addEventListener('click', function() {
            document.getElementById('song_name').value = '';
            document.getElementById('artist_name').value = '';
            document.getElementById('email').value = '';
            employeeCheckbox.checked = isAuthenticated ? true : employeeCheckbox.checked;
            emailGroup.style.display = employeeCheckbox.checked ? 'none' : 'block';
            successMessage.style.display = 'none';
            form.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Request';
            document.getElementById('song_name').focus();
        });
    </script>
</body>
</html>
