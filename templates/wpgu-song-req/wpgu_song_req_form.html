<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <title>WPGU Song Request</title>
    
    <style>
        :root {
            --wpgu-bg: #f8f8f8; 
            --wpgu-text: #1a1a1a; 
            --wpgu-accent: #48d32f; 
        }

        body {
            background-color: var(--wpgu-bg);
            color: var(--wpgu-text);
            font-family: din-2014, sans-serif;
            font-weight: 300;
            font-style: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: din-2014, sans-serif;
            font-weight: 700;
            font-style: normal;
            margin-bottom: 0.5rem;
        }

        .form-container {
            background-color: #f1f1f1;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700; 
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: din-2014, sans-serif;
            font-weight: 300;
            box-sizing: border-box;
            background-color: var(--wpgu-bg);
            color: var(--wpgu-text);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--wpgu-text);
            color: var(--wpgu-bg);
            border: none;
            border-radius: 4px;
            font-family: din-2014, sans-serif;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
        }

        button:hover {
            background-color: #333;
        }

        #success-message {
            display: none;
            color: green;
            font-weight: 700;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>WPGU Song Request</h1>
        <p>Submit a song to be added to the WPGU library.</p>

        <form id="songRequestForm">
            <div class="form-group">
                <label for="song_name">Song Name *</label>
                <input type="text" id="song_name" name="song_name" required>
            </div>

            <div class="form-group">
                <label for="artist_name">Artist Name *</label>
                <input type="text" id="artist_name" name="artist_name" required>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="is_employee" name="is_employee">
                <label for="is_employee" style="margin: 0;">I am an IMC Employee</label>
            </div>

            <div class="form-group" id="email_group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email" name="email" placeholder="To get notified when it's added">
            </div>

            <button type="submit" id="submitBtn">Submit Request</button>
        </form>

        <div id="success-message">Your song request has been submitted!</div>
    </div>

    <script>
        const isLoggedIn = {{ 'true' if is_logged_in else 'false' }};
        const employeeCheckbox = document.getElementById('is_employee');
        const emailGroup = document.getElementById('email_group');
        const form = document.getElementById('songRequestForm');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submitBtn');

        employeeCheckbox.addEventListener('change', function() {
            if (this.checked) {
                if (!isLoggedIn) {
                    window.location.href = `/login?state=${encodeURIComponent(window.location.pathname)}`;
                } else {
                    emailGroup.style.display = 'none';
                }
            } else {
                emailGroup.style.display = 'block';
            }
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const payload = {
                song_name: document.getElementById('song_name').value,
                artist_name: document.getElementById('artist_name').value,
                is_employee: employeeCheckbox.checked,
                email: document.getElementById('email').value
            };

            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            try {
                const response = await fetch('/wpgu-song-requests/form', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    form.reset();
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                } else {
                    alert('There was an error submitting your request. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Request';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('A network error occurred.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Request';
            }
        });

        if (isLoggedIn && employeeCheckbox.checked) {
             emailGroup.style.display = 'none';
        }
    </script>
</body>
</html>
